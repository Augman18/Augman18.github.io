<!DOCTYPE html>
<html>

<head>

	<style>
		#btn{
		position: absolute;
		height: 70px;
		width: 70px;
		border-radius: 90%;
		}
	</style>

</head>

<body> 

<button id="btn">catch me if you can</button>
<script>
	let btn = document.getElementById("btn")
	console.log(btn)
	btn.addEventListener("click", function(){
		console.log("click!")


	})

	btn.addEventListener("mouseover", function(){
		console.log("over!")
		btn.style.top = Math.random() * 700 + "px"
		btn.style.left = Math.random() * 1000 + "px"
		

	})

	btn.addEventListener("mouseout", function(){
		console.log("out!")


	})




</script>

</body>

</html>
