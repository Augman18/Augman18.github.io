<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title></title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>

	<script>
		function setup(){
			createCanvas(800,800)
		}

		function draw() {
			

			push()
			translate()
			ellipse(275, 400, 330, 120)
			ellipse(525, 400, 330, 120)
			circle(400, 375, 275)
			circle(400, 400, 100)
			circle(400, 400, 50)
			ellipse(400, 295, 160, 60)
			pop()

			push()
			translate(width/2,height/2)
			rectMode(CENTER)
			rotate(frameCount * 3)
			rect(0, 0, 180, 20)
			pop()

			push()
			translate(width/2,height/2)
			rectMode(CENTER)
			rotate(frameCount * 4)
			rect(0, 0, 180, 20)
			pop()



		}
	</script>


</body>
</html>
