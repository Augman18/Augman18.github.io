<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title></title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>
 <script>
  function setup() {
   createCanvas(1400,1400); 
}
  function draw() {
    background(200)
    for(let i=0;i < 11; i++){
        for(let j = 0; j < 11; j++){
            let x = i * 100
            let y = j * 100
            circle(x,y,100)
            circle(x-30,y-50,30)
            circle(x+30,y-50,30)
        }
        
  }
  }

 </script>
</body>
</html>
