<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DOCUMENT</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>
	<script>
		
		let xpos
		let ypos

		function setup() {
			createCanvas(800,800)
			background(200)

			xpos = width/2
			ypos = height/2
			
		}

		function draw() {

			let randomNumber = floor(random(4))
			let randomColor = random(["7EA3CC", "E3D7FF", "D68FD6"])
			if (randomNumber == 0){
				xpos = xpos + 8
			} else if (randomNumber == 1){
				xpos = xpos - 8
			} else if (randomNumber == 2){
				ypos = ypos + 8
			} else if (randomNumber == 3){
				ypos = ypos -8
			}
			fill(randomColor)
			circle(xpos, ypos, 15)
		}

	</script>
</body>
</html>
