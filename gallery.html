<!DOCTYPE html>
<html>
<head>
	<style>
		
		.container{
			display: grid;
			grid-template-columns: repeat(3, 1fr);
		}
		.item{
			border: 1px solid black;
		}

	.item img{
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
	#fav{
		grid-column: 1 / 2;
		grid-row: 1 / 2;
	}
	@media (max-width: 800px){
		.container{
			grid-template-columns: repeat(1, 1fr);
		}
	}
	</style>
</head>
<body>
<div class="container">
	<div class="item">
		<img src="bryson.jpeg" alt="bryson too tuff">
	</div>
	<div class="item">
		<img src="kaya.jpeg" alt="kaya too tuff">
		
	</div>
	<div class="item">
		<img src="bron.jpeg" alt="bron too tuff">
	</div>
	<div class="item">
		<img src="jlove.jpeg" alt="jlove too tuff">
	</div>
	<div class="item" id="fav">
		<img src="faiz.jpeg" alt="faiz too tuff">
	</div>
	<div class="item">
		<img src="Dalton.jpeg" alt="dalton tuff">
	</div>

</div>
</body>
</html>
